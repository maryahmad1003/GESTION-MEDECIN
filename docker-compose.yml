version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - server/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gestion_medecin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Passer1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
